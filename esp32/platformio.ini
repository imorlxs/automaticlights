[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; huge_app gives 3 MB for the app — needed because WiFi + BLE together
; exceed the default 1 MB partition limit
board_build.partitions = huge_app.csv

; PubSubClient for MQTT — BLE is built into the ESP32 Arduino core
lib_deps =
    knolleary/PubSubClient @ ^2.8

; Raise MQTT packet buffer (default 256 is fine, bumped for safety)
build_flags =
    -D MQTT_MAX_PACKET_SIZE=512
    -D CONFIG_BT_NIMBLE_ENABLED=0   ; use classic BLE stack, not NimBLE
